<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlo.ai Lead Tester</title>
    <style>
        body {
            font-family: sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 0.5rem;
            display: block;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: #8B5CF6;
            border: none;
            color: #fff;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        button:hover {
            background: #7C3AED;
        }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Lead Flow</h2>


        <label>Recipient Email</label>
        <input type="email" id="email" value="jbrownie.meetbot@gmail.com" required>

        <label>Message</label>
        <textarea id="message"
            rows="4">I want to buy Acme Corp as soon as possible. When are you free to talk?</textarea>

        <button id="sendBtn">Send Lead to Arlo</button>

        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const API_KEY = "f3f0780e66cffcf8800dcf48d12bb9ff39f3115cf35ca648";
        const btn = document.getElementById('sendBtn');
        const statusBox = document.getElementById('statusBox');

        btn.onclick = async () => {
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            if (!email) return alert("Please enter a test email");

            btn.disabled = true;
            btn.innerText = "Processing...";
            statusBox.style.display = 'none';

            try {
                const response = await fetch('http://localhost:8000/api/leads/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        name: "Real-time Test",
                        email: email,
                        message: message
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusBox.innerText = "✅ Lead Captured! Now check " + email + " for Arlo's response (it might take a minute).";
                    statusBox.className = "status success";
                } else {
                    statusBox.innerText = "❌ Error: " + (data.message || "Failed to capture");
                    statusBox.className = "status error";
                }
            } catch (err) {
                statusBox.innerText = "🔴 Connection Error: Is the backend running? " + err.message;
                statusBox.className = "status error";
            } finally {
                statusBox.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Send Lead to Arlo";
            }
        };
    </script>
</body>

</html>
