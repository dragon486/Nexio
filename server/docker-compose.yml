version: '3.8'

services:
  # Standard Redis instance for Queue & Socket synchronization
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  # API Server Role
  nexio-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    restart: on-failure

  # Worker Role (Same image, different entrypoint)
  nexio-worker:
    build: .
    command: ["node", "src/workers/index.js"]
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: on-failure

# Optional: Dedicated network for isolation
networks:
  default:
    name: nexio-net
